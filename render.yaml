services:
  # ──────────────────────────────────────────
  # 1. BACKEND SERVICE (Node.js API)
  # ──────────────────────────────────────────
  - type: web
    name: ai-site-guardian-backend
    env: node
    region: ohio
    rootDir: backend
    # Install dependencies AND playwright browsers required for testing
    buildCommand: npm install && npx playwright install --with-deps chromium
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 8000
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false # User must set this manually in the Render Dashboard
      # Allow the frontend to access the backend API
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: ai-site-guardian-frontend
          envVarKey: RENDER_EXTERNAL_URL

  # ──────────────────────────────────────────
  # 2. FRONTEND SERVICE (Vite + React)
  # ──────────────────────────────────────────
  - type: web
    name: ai-site-guardian-frontend
    env: static
    region: ohio
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist/client
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: ai-site-guardian-backend
          envVarKey: RENDER_EXTERNAL_URL
